name: Publish to PyPI

# This workflow:
# - Builds the package on every push / pull request (for CI validation)
# - Publishes to PyPI on GitHub releases (or manual dispatch)
#
# It uses the repository secret PYPI_API_TOKEN (configured in your repo).

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: "Publish to real PyPI (instead of TestPyPI)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build --upgrade

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # This job only runs on releases or manual dispatch (never on regular commits)
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi == 'true')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses your Repository secret (Settings → Secrets and variables → Actions)
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # This job only runs on manual dispatch (never on regular commits or releases)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi != 'true'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
