name: Publish to PyPI

# This workflow:
# - On every push/PR: just builds the package (CI check, no publishing)
# - On release or version tag push: builds + publishes to PyPI using PYPI_API_TOKEN
# - Manual dispatch: lets you choose PyPI or TestPyPI
#
# Publishing jobs are skipped on normal commits (this is intentional).

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: "Publish to real PyPI (instead of TestPyPI)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build --upgrade

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Publishing only happens on:
    # - GitHub Releases
    # - Pushing a version tag (e.g. v0.2.0)
    # - Manual workflow dispatch with "Publish to real PyPI" = true
    # It is intentionally skipped on normal commits/PRs.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi == 'true')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses your Repository secret (Settings → Secrets and variables → Actions)
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # This only runs via manual dispatch (when you choose not to publish to real PyPI)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi != 'true'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
