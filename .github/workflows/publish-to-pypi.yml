name: Publish to PyPI

# This workflow:
# - On every push/PR: just builds the package (CI check, no publishing)
# - Publishes using Trusted Publishing (OIDC) on releases, version tags, or manual dispatch
#
# First-time setup (bootstrap):
# 1. The PyPI project "AI-SystemAssist" must be created by an initial upload.
# 2. Temporarily add the password line in the publish step (see below).
# 3. Create a release or manually trigger the workflow.
# 4. Once published, go to https://pypi.org/manage/project/AI-SystemAssist/settings/publishing/
#    and add the GitHub Trusted Publisher (owner=RishiSpace, repo=agent-access, workflow=publish-to-pypi.yml).
# 5. Remove the password line from the workflow.
# 6. Future publishes will use OIDC automatically.

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: "Publish to real PyPI (instead of TestPyPI)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build --upgrade

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for Trusted Publishing (OIDC)
    # Publishing only happens on:
    # - GitHub Releases
    # - Pushing a version tag (e.g. v0.2.0)
    # - Manual workflow dispatch with "Publish to real PyPI" = true
    # It is intentionally skipped on normal commits/PRs.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi == 'true')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # BOOTSTRAP (first publish only):
        # Uncomment the line below so the first upload creates the project on PyPI.
        # After it succeeds + you add the Trusted Publisher on PyPI, remove this line.
        # password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for Trusted Publishing (OIDC) on TestPyPI
    # This only runs via manual dispatch (when you choose not to publish to real PyPI)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi != 'true'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        # For first TestPyPI upload, you can temporarily add:
        # password: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
