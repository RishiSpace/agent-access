name: Publish to PyPI

# This workflow:
# - On every push/PR: just builds the package (CI check, no publishing)
# - Publishes using Trusted Publishing (OIDC) only on releases or manual dispatch
#
# CRITICAL BOOTSTRAP NOTE:
# You CANNOT configure Trusted Publishing until the PyPI project exists.
# The project "AI-SystemsAssist" does not exist yet.
#
# To do the FIRST publish (which creates the project):
# 1. Temporarily uncomment the password line in the "Publish to PyPI" step below.
# 2. Commit + push.
# 3. Create a GitHub Release (or use workflow_dispatch with "publish-to-pypi: true").
# 4. Once it succeeds on PyPI, the project will exist.
# 5. Go to https://pypi.org/manage/project/AI-SystemsAssist/settings/publishing/
#    and add GitHub Trusted Publisher:
#      - Owner: RishiSpace
#      - Repository: agent-access
#      - Workflow: publish-to-pypi.yml
#      (leave Environment blank)
# 6. Remove the password line from the workflow.
# 7. Future releases will use pure OIDC (no token needed).

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: "Publish to real PyPI (instead of TestPyPI)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build --upgrade

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for Trusted Publishing (OIDC)
    # Publishing only happens on:
    # - GitHub Releases
    # - Manual workflow dispatch with "Publish to real PyPI" = true
    # It is intentionally skipped on normal commits/PRs (build still runs).
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi == 'true')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # BOOTSTRAP ONLY (for the very first publish):
        # Because the project "AI-SystemsAssist" does not exist on PyPI yet,
        # you must use a token once to CREATE it.
        #
        # STEPS:
        # 1. Uncomment the three lines below.
        # 2. Push this change.
        # 3. Create a GitHub Release (or Run workflow manually with publish-to-pypi=true).
        # 4. After success, the project will exist on PyPI.
        # 5. Add Trusted Publisher on PyPI (see comment at top of this file).
        # 6. Revert this change (remove the with: block) and push again.
        #
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for Trusted Publishing (OIDC) on TestPyPI
    # This only runs via manual dispatch (when you choose not to publish to real PyPI)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi != 'true'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI using Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        # For first TestPyPI upload (optional), temporarily add:
        # password: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
