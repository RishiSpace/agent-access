name: Publish to PyPI

# This workflow publishes the package to PyPI.
# It uses the repository secret PYPI_API_TOKEN (you have this configured).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish-to-pypi:
        description: "Publish to real PyPI (instead of TestPyPI)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build --upgrade

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only run this job for actual releases or when manually chosen
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi == 'true')

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses your Repository secret (Settings → Secrets and variables → Actions)
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Only run on manual dispatch when user chooses TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish-to-pypi != 'true'

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
